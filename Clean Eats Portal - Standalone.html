  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

FFFFF;\n    --line: #1F2C24;\n    --line-soft: rgba(31, 44, 36, 0.55);\n    --ink-1: #FFFFFF;\n    --ink-2: #8A8A8A;\n    --ink-3: #545454;\n    --ink-4: #2E2E2E;\n    --serif: 'Instrument Serif', 'Times New Roman', serif;\n    --sans:  'Space Grotesk', system-ui, sans-serif;\n    --mono:  'JetBrains Mono', monospace;\n    --ease:  cubic-bezier(0.16, 1, 0.3, 1);\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--black); color: var(--ink-1); }\n  body {\n    font-family: var(--sans);\n    font-weight: 300;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n    min-height: 100vh;\n    overflow-x: hidden;\n    letter-spacing: 0.01em;\n  }\n  ::selection { background: var(--orange); color: var(--black); }\n\n  /* ─── ATMOSPHERIC AMBIENT GLOWS ─────────────────────────── */\n  .ambient {\n    position: fixed; inset: 0;\n    pointer-events: none; z-index: 0;\n    overflow: hidden;\n  }\n  .ambient::before, .ambient::after {\n    content: \"\"; position: absolute;\n    width: 60vw; height: 60vw;\n    border-radius: 50%;\n    filter: blur(120px);\n    opacity: 0.35;\n  }\n  .ambient::before {\n    background: radial-gradient(circle, rgba(255,122,47,0.08), transparent 70%);\n    top: -20vw; right: -15vw;\n  }\n  .ambient::after {\n    background: radial-gradient(circle, rgba(31,44,36,0.45), transparent 70%);\n    bottom: -25vw; left: -10vw;\n  }\n\n  /* ─── LAYOUT SHELL ──────────────────────────────────────── */\n  .shell {\n    position: relative;\n    z-index: 1;\n    display: grid;\n    grid-template-columns: 220px 1fr;\n    min-height: 100vh;\n  }\n  @media (max-width: 880px) {\n    .shell { grid-template-columns: 1fr; }\n  }\n\n  /* ─── LEFT NAV (DESKTOP) ────────────────────────────────── */\n  .nav-left {\n    position: fixed;\n    top: 0; left: 0; bottom: 0;\n    width: 220px;\n    padding: 32px 28px;\n    border-right: 1px solid var(--line);\n    display: flex; flex-direction: column;\n    background: linear-gradient(180deg, rgba(10,10,10,0.92), rgba(10,10,10,0.78));\n    backdrop-filter: blur(8px);\n    z-index: 10;\n  }\n  .brand {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: 22px;\n    letter-spacing: -0.01em;\n    color: var(--ink-1);\n    line-height: 1;\n  }\n  .brand small {\n    display: block;\n    font-family: var(--mono);\n    font-style: normal;\n    font-size: 9px;\n    font-weight: 300;\n    color: var(--ink-3);\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    margin-top: 10px;\n  }\n  .nav-items {\n    margin-top: 64px;\n    display: flex; flex-direction: column;\n    gap: 4px;\n  }\n  .nav-item {\n    background: none; border: none;\n    text-align: left;\n    padding: 14px 0;\n    font-family: var(--sans);\n    font-weight: 300;\n    font-size: 14px;\n    color: var(--ink-3);\n    cursor: pointer;\n    transition: color 0.4s var(--ease);\n    position: relative;\n    letter-spacing: 0.01em;\n  }\n  .nav-item .idx {\n    font-family: var(--mono);\n    font-size: 9px;\n    color: var(--ink-4);\n    margin-right: 14px;\n    letter-spacing: 0.1em;\n    transition: color 0.4s var(--ease);\n  }\n  .nav-item:hover { color: var(--ink-2); }\n  .nav-item.active {\n    color: var(--ink-1);\n  }\n  .nav-item.active .idx { color: var(--orange); }\n  .nav-item.active::before {\n    content: \"\";\n    position: absolute;\n    left: -28px; top: 50%;\n    width: 18px; height: 1px;\n    background: var(--orange);\n    transform: translateY(-50%);\n    animation: pulse-line 2.6s ease-in-out infinite;\n  }\n  @keyframes pulse-line {\n    0%, 100% { opacity: 0.45; width: 12px; }\n    50%      { opacity: 1;    width: 22px; }\n  }\n  .nav-foot {\n    margin-top: auto;\n    font-family: var(--mono);\n    font-size: 9px;\n    color: var(--ink-3);\n    letter-spacing: 0.18em;\n    line-height: 1.7;\n  }\n  .nav-foot .pulse-dot {\n    display: inline-block;\n    width: 6px; height: 6px;\n    background: #2dd66f;\ s var(--ease), transform 0.9s var(--ease); }\n  .reveal.in { opacity: 1; transform: translateY(0); }\n  .reveal[data-delay=\"1\"] { transition-delay: 0.08s; }\n  .reveal[data-delay=\"2\"] { transition-delay: 0.16s; }\n  .reveal[data-delay=\"3\"] { transition-delay: 0.24s; }\n  .reveal[data-delay=\"4\"] { transition-delay: 0.32s; }\n  .reveal[data-delay=\"5\"] { transition-delay: 0.4s; }\n  .reveal[data-delay=\"6\"] { transition-delay: 0.48s; }\n\n  /* ─── SHARED TYPOGRAPHY ─────────────────────────────────── */\n  .eyebrow {\n    font-family: var(--mono);\n    font-size: 10px;\n    color: var(--ink-3);\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n  }\n  .whisper {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: clamp(28px, 4vw, 44px);\n    line-height: 1.1;\n    color: var(--ink-1);\n    letter-spacing: -0.015em;\n  }\n  .whisper em { font-style: italic; color: var(--orange); }\n  .label-meta {\n    font-family: var(--mono);\n    font-size: 10px;\n    color: var(--ink-3);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n  }\n\n  /* ─── TAB 1: ENTWICKLUNG ────────────────────────────────── */\n\n  /* Asymmetric grid */\n  .dev-grid {\n    display: grid;\n    grid-template-columns: 1.4fr 1fr;\n    gap: 80px;\n    margin-top: 64px;\n  }\n  @media (max-width: 880px) {\n    .dev-grid { grid-template-columns: 1fr; gap: 64px; margin-top: 40px; }\n  }\n\n  /* Radar score */\n  .radar-wrap {\n    position: relative;\n    width: 100%;\n    max-width: 380px;\n    aspect-ratio: 1;\n    margin-left: -8px;\n  }\n  .radar-wrap svg { width: 100%; height: 100%; overflow: visible; }\n  .radar-center {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    text-align: center;\n    pointer-events: none;\n  }\n  .radar-value {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: clamp(72px, 11vw, 128px);\n    line-height: 0.9;\n    color: var(--ink-1);\n    letter-spacing: -0.04em;\n  }\n  .radar-value sup {\n    font-family: var(--mono);\n    font-style: normal;\n    font-size: 14px;\n    color: var(--orange);\n    vertical-align: top;\n    margin-left: 4px;\n    letter-spacing: 0;\n  }\n  .radar-label {\n    font-family: var(--mono);\n    font-size: 10px;\n    color: var(--ink-3);\n    letter-spacing: 0.24em;\n    margin-top: 12px;\n    text-transform: uppercase;\n  }\n  /* Floating annotation */\n  .radar-note {\n    position: absolute;\n    bottom: 8%;\n    right: -8%;\n    font-family: var(--mono);\n    font-size: 10px;\n    color: var(--ink-3);\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    max-width: 120px;\n    line-height: 1.6;\n  }\n  .radar-note .bar {\n    display: block; width: 22px; height: 1px;\n    background: var(--orange);\n    margin-bottom: 8px;\n  }\n\n  /* Right column blocks */\n  .dev-side { display: flex; flex-direction: column; gap: 72px; }\n\n  /* Streak */\n  .streak {\n    display: flex; align-items: baseline; gap: 18px;\n  }\n  .streak-num {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: clamp(120px, 16vw, 200px);\n    line-height: 0.85;\n    color: var(--orange);\n    letter-spacing: -0.05em;\n    text-shadow: 0 0 60px rgba(255, 122, 47, 0.25);\n  }\n  .streak-text {\n    font-size: 13px;\n    color: var(--ink-2);\n    letter-spacing: 0.04em;\n    line-height: 1.5;\n    max-width: 140px;\n    padding-bottom: 14px;\n  }\n\n  /* Weight curve section */\n  .weight {\n    margin-top: 100px;\n    position: relative;\n  }\n  @media (max-width: 880px) { .weight { margin-top: 64px; } }\n\n  .weight-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: flex-end;\n    margin-bottom: 32px;\n    gap: 24px;\n    flex-wrap: wrap;\n  }\n  .weight-diff {\n    font-family: var(--serif);\n    font-style: italic;\n    font-size: clamp(48px, 7vw, 84px);\n    line-height: 0.9;\n    color: var(--ink-1);\n    letter nge));\n    box-shadow: 0 0 12px rgba(255,122,47,0.4);\n    width: 0;\n    transition: width 1.8s var(--ease);\n  }\n  .macro-bar-fill::after {\n    content: \"\";\n    position: absolute;\n    right: -3px; top: -3px;\n    width: 7px; height: 7px;\n    border-radius: 50%;\n    background: var(--orange);\n    box-shadow: 0 0 12px var(--orange-glow);\n  }\n  .macro-val {\n    font-family: var(--mono);\n    font-size: 12px;\n    color: var(--ink-2);\n    letter-spacing: 0.06em;\n    text-align: right;\n  }\n  .macro-val em {\n    font-style: normal;\n    color: var(--ink-1);\n    font-size: 14px;\n  }\n\n  /* ─── TAB 2: COACHING ───────────────────────────────────── */\n\n  .section { margin-top: 80px; }\n  .section:first-of-type { margin-top: 56px; }\n  @media (max-width: 880px) { .section { margin-top: 64px; } .section:first-of-type { margin-top: 40px; } }\n\n  /* Tonfall cards */\n  .tone-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 16px;\n    margin-top: 36px;\n  }\n  @media (max-width: 880px) {\n    .tone-grid { grid-template-columns: 1fr; }\n  }\n  .tone-card {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: 4px;\n    padding: 28px 24px 26px;\n    cursor: pointer;\n    position: relative;\n    transition: all 0.5s var(--ease);\n    text-align: left;\n    color: var(--ink-1);\n    font-family: var(--sans);\n    overflow: hidden;\n  }\n  .tone-card::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background: radial-gradient(circle at 50% -20%, var(--orange-dim), transparent 60%);\n    opacity: 0;\n    transition: opacity 0.6s var(--ease);\n    pointer-events: none;\n  }\n  .tone-card:hover::before { opacity: 0.6; }\n  .tone-card:hover {\n    border-color: rgba(255,122,47,0.25);\n    box-shadow: 0 0 40px rgba(255,122,47,0.08);\n  }\n  .tone-card.active {\n    border-color: var(--orange);\n    box-shadow: 0 0 0 1px var(--orange), 0 0 50px rgba(255,122,47,0.18);\n  }\n m meldet sich nur, wenn du fragst.\">\n              <span class=\"prox-label\">Wenig<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"prox-point active\" style=\"left:50%;\" data-prox=\"normal\" data-meaning=\"Das System meldet sich 1× täglich.\">\n              <span class=\"prox-label\">Normal<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"prox-point\" style=\"left:100%;\" data-prox=\"viel\" data-meaning=\"Das System begleitet jede Mahlzeit &amp; jedes Training.\">\n              <span class=\"prox-label\">Viel<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"prox-meaning\" id=\"prox-meaning\">Das System meldet sich 1× täglich.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- WOCHENFOKUS -->\n      <div class=\"section\">\n        <div class=\"eyebrow\">Wochenfokus<\u002Fdiv>\n        <div class=\"focus-tags\" id=\"focus-tags\">\n          <button class=\"pill active\" data-focus=\"defizit\">Kaloriendefizit<\u002Fbutton>\n          <button class=\"pill\" data-focus=\"protein\">Mehr Protein<\u002Fbutton>\n          <button class=\"pill\" data-focus=\"training\">Trainingsernährung<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- SPRACHE -->\n      <div class=\"section\">\n        <div class=\"eyebrow\">Sprache<\u002Fdiv>\n        <div class=\"lang-row\" id=\"lang-row\">\n          <div style=\"display:flex;align-items:center;\">\n            <button class=\"flag-btn active\" data-lang=\"de\" aria-label=\"Deutsch\">\n              <svg viewBox=\"0 0 5 3\" preserveAspectRatio=\"none\">\n                <rect width=\"5\" height=\"1\" y=\"0\" fill=\"#000\"><\u002Frect>\n                <rect width=\"5\" height=\"1\" y=\"1\" fill=\"#DD0000\"><\u002Frect>\n                <rect width=\"5\" height=\"1\" y=\"2\" fill=\"#FFCE00\"><\u002Frect>\n              <\u002Fsvg>\n            <\u002Fbutton>\n            <span class=\"flag-code\">DE<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;\">\n            <button class=\"flag-btn\" data-lang=\"en\" aria-label=\"English\">\n              <svg viewBox=\"0 0 60 30\" preserveAspectRatio=\"none\">\n                <clipPath id=\"t\"><path d=\"M0,0 v30 h60 v-30 z\"><\u002Fpath><\u002FclipPath>\n                <clipPath id=\"s\"><path d=\"M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z\"><\u002Fpath><\u002FclipPath>\n                <g clip-path=\"url(#t)\">\n                  <path d=\"M0,0 v30 h60 v-30 z\" fill=\"#012169\"><\u002Fpath>\n                  <path d=\"M0,0 L60,30 M60,0 L0,30\" stroke=\"#fff\" stroke-width=\"6\"><\u002Fpath>\n                  <path d=\"M0,0 L60,30 M60,0 L0,30\" clip-path=\"url(#s)\" stroke=\"#C8102E\" stroke-width=\"4\"><\u002Fpath>\n                  <path d=\"M30,0 v30 M0,15 h60\" stroke=\"#fff\" stroke-width=\"10\"><\u002Fpath>\n                  <path d=\"M30,0 v30 M0,15 h60\" stroke=\"#C8102E\" stroke-width=\"6\"><\u002Fpath>\n                <\u002Fg>\n              <\u002Fsvg>\n            <\u002Fbutton>\n            <span class=\"flag-code\">EN<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button class=\"save-link\" id=\"save-btn\">Änderungen speichern <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n\n      <div class=\"footer\">Dein Coach ist immer auf WhatsApp.<\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ── TAB 3 — PROFIL ── -->\n    <section class=\"panel\" id=\"panel-profile\">\n      <header class=\"stagger\">\n        <div class=\"panel-sub\">Tab 03 · Deine Daten<\u002Fdiv>\n        <div class=\"panel-title\">\n          <h1>Mein Profil<\u002Fh1>\n        <\u002Fdiv>\n      <\u002Fheader>\n\n      <div class=\"profile-grid\">\n        <!-- ZIEL -->\n        <div class=\"field-card full\">\n          <span class=\"ftitle\">Ziel<\u002Fspan>\n          <div class=\"goal-row\" id=\"goal-row\">\n            <button class=\"goal-opt active\" data-goal=\"abnehmen\">\n              <span class=\"gnum\">01<\u002Fspan>\n              <span class=\"gname\">Abnehmen<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"goal-opt\" data-goal=\"muskel\">\n              <span class=\"gnum\">02<\u002Fspan>\n              <span class=\"gname\">Muskelaufbau<\u002Fspan>\n            <\u002Fbutton>\n            <button class=\"goal-opt\" data-goal=\"gesund\">\n              <span class=\"gnum\">03<\u002Fspan>\n              <span class=\"gname\">Gesünder essen<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- GEWICHT -->\n        <div class=\"field-card\">\n          <span class=\"ftitle\">Aktuelles Gewicht<\u002Fspan>\n          <div class=\"edit-icon\">\n            <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\">\n              <path d=\"M2 14 L2 11 L11 2 L14 5 L5 14 Z\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"weight-input\">\n            <input class=\"num\" type=\"text\" inputmode=\"decimal\" value=\"84,2\" id=\"weight-val\">\n            <span class=\"unit\">KG<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"weight-trend\">−4,2 kg <em>seit Start<\u002Fem><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TRAINING -->\n        <div class=\"field-card\">\n          <span class=\"ftitle\">Trainingstage<\u002Fspan>\n          <div class=\"edit-icon\">\n            <svg viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\">\n              <path d=\"M2 14 L2 11 L11 2 L14 5 L5 14 Z\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"days\" id=\"days\">\n            <button class=\"day active\" data-day=\"mo\">MO<\u002Fbutton>\n            <button class=\"day\" data-day=\"di\">DI<\u002Fbutton>\n            <button class=\"day active\" data-day=\"mi\">MI<\u002Fbutton>\n            <button class=\"day\" data-day=\"do\">DO<\u002Fbutton>\n            <button class=\"day active\" data-day=\"fr\">FR<\u002Fbutton>\n            <button class=\"day\" data-day=\"sa\">SA<\u002Fbutton>\n            <button class=\"day active\" data-day=\"so\">SO<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- ALLERGIEN -->\n        <div class=\"field-card full\">\n          <span class=\"ftitle\">Allergien &amp; Dislikes<\u002Fspan>\n          <div class=\"tags\" id=\"allergies\">\n            <span class=\"tag\">Laktose <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Brokkoli <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Thunfisch <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <button class=\"tag-add\">+ Hinzufügen<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- KÜHLSCHRANK -->\n        <div class=\"field-card full\">\n          <span class=\"ftitle\">Kühlschrank · Vorräte<\u002Fspan>\n          <div class=\"tags\" id=\"fridge\">\n            <span class=\"tag\">Hähnchenbrust <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Reis <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Eier <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Spinat <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Skyr <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <span class=\"tag\">Olivenöl <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton><\u002Fspan>\n            <button class=\"tag-add\">+ Hinzufügen<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <button class=\"delete-data\">Daten löschen<\u002Fbutton>\n\n      <div class=\"footer\">Dein Coach ist immer auf WhatsApp.<\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n\n<!-- ─── BOTTOM NAV (mobile) ───────────────────────────── -->\n<nav class=\"nav-bottom\">\n  <div class=\"nav-bottom-inner\" id=\"nav-mobile\">\n    <button class=\"nav-item active\" data-tab=\"dev\"><span class=\"idx\">01<\u002Fspan>Entwicklung<\u002Fbutton>\n    <button class=\"nav-item\" data-tab=\"coach\"><span class=\"idx\">02<\u002Fspan>Coaching<\u002Fbutton>\n    <button class=\"nav-item\" data-tab=\"profile\"><span class=\"idx\">03<\u002Fspan>Profil<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<script>\n  // ─── TAB SWITCHING ────────────────────────────────────\n  const tabs = ['dev', 'coach', 'profile'];\n  const panels = {\n    dev:     document.getElementById('panel-dev'),\n    coach:   document.getElementById('panel-coach'),\n    profile: document.getElementById('panel-profile')\n  };\n  const navBtns = document.querySelectorAll('.nav-item');\n\n  function switchTab(name) {\n    tabs.forEach(t => panels[t].classList.toggle('active', t === name));\n    navBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === name));\n    // re-trigger reveals\n    document.querySelectorAll('.panel.active .reveal').forEach(el => {\n      el.classList.remove('in');\n      requestAnimationFrame(() => observer.observe(el));\n    });\n    // re-trigger any tab-specific entrances\n    if (name === 'dev') { setTimeout(runDevAnimations, 100); }\n    window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n  navBtns.forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));\n\n  // ─── REVEAL ON SCROLL ─────────────────────────────────\n  const observer = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add('in');\n        observer.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.18 });\n  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));\n\n  // ─── COUNT-UP ANIMATIONS ──────────────────────────────\n  function countUp(el, target, duration = 1600, suffix = '') {\n    const start = performance.now();\n    const from = 0;\n    function tick(now) {\n      const t = Math.min(1, (now - start) / duration);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const v = Math.round(from + (target - from) * eased);\n      el.textContent = v + suffix;\n      if (t < 1) requestAnimationFrame(tick);\n      else el.textContent = target + suffix;\n    }\n    requestAnimationFrame(tick);\n  }\n\n  // ─── RADAR ARC ────────────────────────────────────────\n  function buildRadar(scorePct) {\n    const cx = 200, cy = 200, r = 168;\n    const arc = document.getElementById('radar-arc');\n    const ticks = document.getElementById('radar-ticks');\n    arc.innerHTML = '';\n    ticks.innerHTML = '';\n\n    // ticks around perimeter\n    for (let i = 0; i < 60; i++) {\n      const a = (i / 60) * Math.PI * 2 - Math.PI / 2;\n      const r1 = 188, r2 = i % 5 === 0 ? 196 : 192;\n      const x1 = cx + Math.cos(a) * r1, y1 = cy + Math.sin(a) * r1;\n      const x2 = cx + Math.cos(a) * r2, y2 = cy + Math.sin(a) * r2;\n      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');\n      line.setAttribute('x1', x1); line.setAttribute('y1', y1);\n      line.setAttribute('x2', x2); line.setAttribute('y2', y2);\n      line.setAttribute('stroke', i % 5 === 0 ? '#2A3A30' : '#1F2C24');\n      line.setAttribute('stroke-width', '0.6');\n      ticks.appendChild(line);\n    }\n\n    // fragmented active arc: split into N segments with gaps\n    const totalSegments = 28;\n    const activeSegments = Math.round((scorePct / 100) * totalSegments);\n    const startAngle = -Math.PI / 2; // top\n    const sweep = Math.PI * 1.6; // 288 deg\n    for (let i = 0; i < activeSegments; i++) {\n      const segLen = sweep / totalSegments;\n      const a0 = startAngle + i * segLen + segLen * 0.15;\n      const a1 = startAngle + (i + 1) * segLen - segLen * 0.15;\n      const x0 = cx + Math.cos(a0) * r, y0 = cy + Math.sin(a0) * r;\n      const x1 = cx + Math.cos(a1) * r, y1 = cy + Math.sin(a1) * r;\n      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n      const large = (a1 - a0) > Math.PI ? 1 : 0;\n      path.setAttribute('d', `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`);\n      path.setAttribute('stroke', '#FF7A2F');\n      path.setAttribute('stroke-width', i > activeSegments - 4 ? '4' : '2.5');\n      path.setAttribute('stroke-linecap', 'round');\n      path.setAttribute('fill', 'none');\n      path.setAttribute('opacity', '0');\n      path.style.transition = `opacity 0.5s var(--ease) ${i * 35}ms`;\n      if (i > activeSegments - 4) {\n        path.setAttribute('filter', 'drop-shadow(0 0 6px rgba(255,122,47,0.7))');\n      }\n      arc.appendChild(path);\n      requestAnimationFrame(() => { path.setAttribute('opacity', '1'); });\n    }\n\n    // inactive (faint) segments for the remainder\n    for (let i = activeSegments; i < totalSegments; i++) {\n      const segLen = sweep / totalSegments;\n      const a0 = startAngle + i * segLen + segLen * 0.15;\n      const a1 = startAngle + (i + 1) * segLen - segLen * 0.15;\n      const x0 = cx + Math.cos(a0) * r, y0 = cy + Math.sin(a0) * r;\n      const x1 = cx + Math.cos(a1) * r, y1 = cy + Math.sin(a1) * r;\n      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');\n      const large = (a1 - a0) > Math.PI ? 1 : 0;\n      path.setAttribute('d', `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`);\n      path.setAttribute('stroke', '#1F2C24');\n      path.setAttribute('stroke-width', '1.5');\n      path.setAttribute('stroke-linecap', 'round');\n      path.setAttribute('fill', 'none');\n      arc.appendChild(path);\n    }\n  }\n\n  // ─── WEIGHT CURVE ─────────────────────────────────────\n  function buildWeightCurve() {\n    const pts = [88.4, 88.1, 87.6, 87.0, 86.7, 86.4, 86.0, 85.7, 85.4, 85.1, 84.9, 84.6, 84.4, 84.2];\n    const w = 800, h = 200, padL = 20, padR = 20, padT = 30, padB = 30;\n    const xs = pts.map((_, i) => padL + (i / (pts.length - 1)) * (w - padL - padR));\n    const min = Math.min(...pts), max = Math.max(...pts);\n    const ys = pts.map(v => padT + (1 - (v - min) / (max - min)) * (h - padT - padB));\n\n    // smooth cubic bezier path\n    let d = `M ${xs[0]} ${ys[0]}`;\n    for (let i = 1; i < pts.length; i++) {\n      const cp1x = xs[i - 1] + (xs[i] - xs[i - 1]) / 2;\n      const cp1y = ys[i - 1];\n      const cp2x = xs[i - 1] + (xs[i] - xs[i - 1]) / 2;\n      const cp2y = ys[i];\n      d += ` C ${cp1x} ${cp1y}, ${cp2x} ${cp2y}, ${xs[i]} ${ys[i]}`;\n    }\n    const path = document.getElementById('weight-path');\n    const glow = document.getElementById('weight-glow-path');\n    path.setAttribute('d', d);\n    glow.setAttribute('d', d);\n\n    // animate stroke\n    const len = path.getTotalLength();\n    path.style.strokeDasharray = len;\n    path.style.strokeDashoffset = len;\n    glow.style.strokeDasharray = len;\n    glow.style.strokeDashoffset = len;\n    requestAnimationFrame(() => {\n      path.style.transition = 'stroke-dashoffset 2.2s var(--ease)';\n      glow.style.transition = 'stroke-dashoffset 2.2s var(--ease)';\n      path.style.strokeDashoffset = 0;\n      glow.style.strokeDashoffset = 0;\n    });\n\n    // endpoint\n    const end = document.getElementById('weight-end');\n    const halo = document.getElementById('weight-end-halo');\n    end.setAttribute('cx', xs[xs.length - 1]);\n    end.setAttribute('cy', ys[ys.length - 1]);\n    halo.setAttribute('cx', xs[xs.length - 1]);\n    halo.setAttribute('cy', ys[ys.length - 1]);\n    end.style.opacity = '0';\n    halo.style.opacity = '0';\n    setTimeout(() => {\n      end.style.transition = 'opacity 0.6s var(--ease)';\n      halo.style.transition = 'opacity 0.6s var(--ease)';\n      end.style.opacity = '1';\n      halo.style.opacity = '1';\n    }, 2000);\n  }\n\n  // ─── MACRO BARS ───────────────────────────────────────\n  function animateMacros() {\n    document.querySelectorAll('.macro').forEach((m, i) => {\n      const fill = m.querySelector('.macro-bar-fill');\n      const w = m.dataset.width;\n      fill.style.width = '0%';\n      setTimeout(() => { fill.style.width = w + '%'; }, 600 + i * 150);\n    });\n  }\n\n  // ─── DEV TAB ENTRANCE ─────────────────────────────────\n  let devRan = false;\n  function runDevAnimations() {\n    buildRadar(86);\n    countUp(document.getElementById('radar-num'), 86, 1800);\n    countUp(document.querySelector('.streak-num'), 14, 1500);\n    countUp(document.getElementById('weight-diff-num'), 4.2, 1400);\n    // override decimal handling for the diff number\n    setTimeout(() => {\n      document.getElementById('weight-diff-num').textContent = '4,2';\n    }, 1450);\n    buildWeightCurve();\n    animateMacros();\n  }\n  // run on initial load\n  setTimeout(runDevAnimations, 350);\n\n  // ─── COACHING INTERACTIONS ────────────────────────────\n  // Tone cards\n  document.getElementById('tone-grid').addEventListener('click', e => {\n    const card = e.target.closest('.tone-card');\n    if (!card) return;\n    document.querySelectorAll('.tone-card').forEach(c => c.classList.remove('active'));\n    card.classList.add('active');\n  });\n\n  // Proaktivität\n  document.getElementById('prox-track').addEventListener('click', e => {\n    const pt = e.target.closest('.prox-point');\n    if (!pt) return;\n    document.querySelectorAll('.prox-point').forEach(p => p.classList.remove('active'));\n    pt.classList.add('active');\n    const meaning = document.getElementById('prox-meaning');\n    meaning.style.opacity = '0';\n    setTimeout(() => {\n      meaning.textContent = pt.dataset.meaning;\n      meaning.style.opacity = '1';\n    }, 220);\n  });\n\n  // Focus pills (multi-select)\n  document.getElementById('focus-tags').addEventListener('click', e => {\n    const p = e.target.closest('.pill');\n    if (!p) return;\n    p.classList.toggle('active');\n  });\n\n  // Language flags\n  document.getElementById('lang-row').addEventListener('click', e => {\n    const f = e.target.closest('.flag-btn');\n    if (!f) return;\n    document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active'));\n    f.classList.add('active');\n  });\n\n  // Save link\n  document.getElementById('save-btn').addEventListener('click', () => {\n    const btn = document.getElementById('save-btn');\n    const original = btn.innerHTML;\n    btn.innerHTML = 'Gespeichert.';\n    btn.style.color = 'var(--ink-1)';\n    setTimeout(() => {\n      btn.innerHTML = original;\n      btn.style.color = '';\n    }, 1800);\n  });\n\n  // ─── PROFILE INTERACTIONS ─────────────────────────────\n  // Goal cards\n  document.getElementById('goal-row').addEventListener('click', e => {\n    const g = e.target.closest('.goal-opt');\n    if (!g) return;\n    document.querySelectorAll('.goal-opt').forEach(o => o.classList.remove('active'));\n    g.classList.add('active');\n  });\n\n  // Days\n  document.getElementById('days').addEventListener('click', e => {\n    const d = e.target.closest('.day');\n    if (!d) return;\n    d.classList.toggle('active');\n  });\n\n  // Tag removal\n  function setupTagContainer(id) {\n    const root = document.getElementById(id);\n    root.addEventListener('click', e => {\n      if (e.target.classList.contains('x')) {\n        const tag = e.target.closest('.tag');\n        tag.style.transition = 'opacity 0.3s var(--ease), transform 0.3s var(--ease)';\n        tag.style.opacity = '0';\n        tag.style.transform = 'scale(0.85)';\n        setTimeout(() => tag.remove(), 280);\n      }\n      if (e.target.classList.contains('tag-add')) {\n        const v = prompt('Was möchtest du hinzufügen?');\n        if (v && v.trim()) {\n          const tag = document.createElement('span');\n          tag.className = 'tag';\n          tag.innerHTML = v.trim() + ' <button class=\"x\" aria-label=\"entfernen\">×<\u002Fbutton>';\n          tag.style.opacity = '0';\n          tag.style.transform = 'scale(0.85)';\n          root.insertBefore(tag, e.target);\n          requestAnimationFrame(() => {\n            tag.style.transition = 'opacity 0.4s var(--ease), transform 0.4s var(--ease)';\n            tag.style.opacity = '1';\n            tag.style.transform = 'scale(1)';\n          });\n        }\n      }\n    });\n  }\n  setupTagContainer('allergies');\n  setupTagContainer('fridge');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
